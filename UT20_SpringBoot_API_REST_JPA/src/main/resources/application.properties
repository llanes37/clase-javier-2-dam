# ============================================================
# application.properties — Configuración de UT20_SpringBoot_API_REST_JPA
# ============================================================
#
# Este fichero configura Spring Boot para el entorno de DESARROLLO.
# Spring Boot lee este fichero al arrancar y aplica la configuración.
#
# ESTRUCTURA DE SECCIONES:
#   1. Base de datos H2 (en memoria)
#   2. JPA / Hibernate
#   3. Consola H2 (interfaz web para explorar la BD)
#   4. Swagger / OpenAPI
#   5. Logging
# ============================================================


# ============================================================
# 1. BASE DE DATOS H2 (en memoria — versión simplificada)
# ============================================================

# ! La URL de conexión JDBC. Partes clave:
#   jdbc:h2:mem:  → Base de datos EN MEMORIA (se pierden datos al reiniciar)
#   ut20db        → Nombre de la BD (visible en la consola H2)
#   DB_CLOSE_DELAY=-1 → Mantener la BD activa mientras la app esté corriendo
#   DB_CLOSE_ON_EXIT=FALSE → No cerrar la BD al salir de la JVM (necesario para tests)
spring.datasource.url=jdbc:h2:mem:ut20db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# * Driver que usa Spring para conectarse a la BD
# ? H2 incluye su propio driver JDBC — no hace falta instalación externa
spring.datasource.driverClassName=org.h2.Driver

# * Credenciales de acceso a H2
# ! En producción NUNCA dejes el password vacío. Aquí es válido para demos.
spring.datasource.username=sa
spring.datasource.password=


# ============================================================
# 2. JPA / HIBERNATE
# ============================================================

# ! ddl-auto controla cómo Hibernate gestiona el esquema de BD:
#
#   create       → Borra y crea las tablas al arrancar (PIERDE DATOS)
#   create-drop  → Como create, pero borra las tablas al parar la app
#   update       → Crea o modifica tablas SIN borrar datos existentes (RECOMENDADO en dev)
#   validate     → Solo comprueba que las tablas existen (no crea nada) — PROD
#   none         → Hibernate no toca el esquema (gestión manual con Flyway/Liquibase) — PROD
#
# * Para UT20 usamos "update": Hibernate crea las tablas automáticamente
# * al arrancar (basándose en @Entity). Si añades un campo, lo añade a la BD.
spring.jpa.hibernate.ddl-auto=update

# * Mostrar el SQL generado por Hibernate en la consola
# ? Útil para aprender qué SQL genera JPA. Desactívalo en producción (false).
spring.jpa.show-sql=true

# * Formatear el SQL para que sea legible (con indentación)
# ? Solo tiene efecto si show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# * Dialecto de BBDD — le dice a Hibernate qué SQL generar
# ? H2 es compatible con muchos dialectos; Spring Boot lo detecta automáticamente
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect


# ============================================================
# 3. CONSOLA H2 (interfaz web)
# ============================================================

# ! Activa la consola web de H2 disponible en: http://localhost:8080/h2-console
# * Permite explorar las tablas y ejecutar SQL directamente desde el navegador
# ? En producción: spring.h2.console.enabled=false (por seguridad)
spring.h2.console.enabled=true

# * Ruta donde se expone la consola (puedes cambiarla si hay conflicto)
spring.h2.console.path=/h2-console

# * Permite conexiones remotas a la consola (necesario cuando la app corre en Docker)
# ! En producción: desactívalo
spring.h2.console.settings.web-allow-others=false


# ============================================================
# 4. SWAGGER / OpenAPI
# ============================================================

# * Título de la API en Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html

# ? Accede a Swagger UI en: http://localhost:8080/swagger-ui/index.html
# ? Accede al JSON de la API en: http://localhost:8080/api-docs


# ============================================================
# 5. LOGGING
# ============================================================

# * Nivel de log para el paquete de la aplicación
# ? Niveles: TRACE < DEBUG < INFO < WARN < ERROR
# ! Para ver las consultas SQL generadas por Hibernate: DEBUG
logging.level.com.curso.ut20=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
