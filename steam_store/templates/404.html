{% extends 'base.html' %}

{% block title %}Página no encontrada{% endblock %}

{% block content %}
<div class="fade-in text-center py-5">
    
    <div style="font-size: 8rem; color: var(--steam-accent); line-height: 1;">
        <i class="bi bi-emoji-dizzy"></i>
    </div>
    
    <h1 class="mt-4" style="color: var(--steam-text-light); font-size: 3rem;">
        404
    </h1>
    
    <h3 class="mb-4" style="color: var(--steam-text);">
        ¡Oops! Página no encontrada
    </h3>
    
    <p class="text-muted mb-5">
        La página que buscas no existe o ha sido movida a otra ubicación.
    </p>
    
    <div class="d-flex justify-content-center gap-3">
        <a href="{{ url_for('index') }}" class="btn btn-steam btn-lg">
            <i class="bi bi-house"></i> Volver al inicio
        </a>
        <a href="{{ url_for('tienda') }}" class="btn btn-steam-outline btn-lg">
            <i class="bi bi-shop"></i> Explorar tienda
        </a>
    </div>
    
</div>
{% endblock %}
