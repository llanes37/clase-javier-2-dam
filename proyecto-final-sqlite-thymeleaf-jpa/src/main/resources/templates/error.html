<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Error')}"></head>
<body class="bg-light">

<div th:replace="~{fragments/nav :: topnav}"></div>

<main class="container-lg py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 text-center">
            <!-- Pantalla controlada de error — no expone stacktrace al usuario -->
            <div class="display-1 mb-3" style="color:#0e6d82;">⚠️</div>
            <h2 class="fw-bold mb-2" th:text="${titulo}">Error</h2>
            <p class="text-muted mb-4" th:text="${mensaje}">Ha ocurrido un error.</p>
            <a class="btn btn-primary fw-semibold px-4" th:href="@{/}">
                <i class="bi bi-house me-2"></i>Volver al inicio
            </a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
