<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{fragments/head :: head('Alumnos')}"></head>
<body class="bg-light">

<div th:replace="~{fragments/nav :: topnav}"></div>

<main class="container-lg py-4">

    <!-- Cabecera de página -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="fw-bold mb-0"><i class="bi bi-people-fill me-2 text-primary"></i>Alumnos</h2>
            <p class="text-muted small mb-0">Gestión del registro de alumnos</p>
        </div>
        <a class="btn btn-primary fw-semibold" th:href="@{/alumnos/nuevo}" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-person-plus me-2"></i>Nuevo alumno
        </a>
    </div>

    <!-- Banner solo lectura -->
    <div class="alert alert-info d-flex align-items-center gap-2 py-2 mb-3" sec:authorize="hasRole('USER')">
        <i class="bi bi-eye-fill"></i>
        Estás en modo <strong class="ms-1">solo lectura</strong>. Contacta con un administrador para realizar cambios.
    </div>

    <!-- Alertas flash -->
    <div class="alert alert-success d-flex align-items-center gap-2 py-2" th:if="${ok}" role="alert">
        <i class="bi bi-check-circle-fill"></i><span th:text="${ok}"></span>
    </div>
    <div class="alert alert-danger d-flex align-items-center gap-2 py-2" th:if="${error}" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i><span th:text="${error}"></span>
    </div>

    <!-- Contador -->
    <div class="mb-3">
        <span class="badge bg-secondary px-3 py-2">
            <i class="bi bi-people me-1"></i>
            <span th:text="${#lists.size(alumnos)}">0</span> alumno(s) registrado(s)
        </span>
    </div>

    <!-- Tabla -->
    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="text-muted ps-4 fw-semibold" style="width:60px">#</th>
                    <th class="fw-semibold">Alumno</th>
                    <th class="fw-semibold">Email</th>
                    <th class="fw-semibold">Fecha nacimiento</th>
                    <th class="fw-semibold pe-4" style="width:160px">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="alumno : ${alumnos}">
                    <td class="text-muted ps-4 small" th:text="${alumno.id}">1</td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <span class="pf-avatar"
                                  th:text="${#strings.toUpperCase(#strings.substring(alumno.nombre,0,1))}">A</span>
                            <span class="fw-semibold" th:text="${alumno.nombre}">Nombre</span>
                        </div>
                    </td>
                    <td class="text-muted small" th:text="${alumno.email}">email@demo.com</td>
                    <td class="text-muted small"
                        th:text="${alumno.fechaNacimiento != null ? alumno.fechaNacimiento : '—'}">—</td>
                    <td class="pe-4">
                        <div class="d-flex gap-2" sec:authorize="hasRole('ADMIN')">
                            <a class="btn btn-sm btn-outline-secondary fw-semibold"
                               th:href="@{|/alumnos/${alumno.id}/editar|}">
                                <i class="bi bi-pencil me-1"></i>Editar
                            </a>
                            <form th:action="@{|/alumnos/${alumno.id}/eliminar|}" method="post"
                                  onsubmit="return confirm('¿Eliminar al alumno? Esta acción no se puede deshacer.');">
                                <button class="btn btn-sm btn-outline-danger fw-semibold" type="submit">
                                    <i class="bi bi-trash me-1"></i>Eliminar
                                </button>
                            </form>
                        </div>
                        <span class="text-muted small" sec:authorize="hasRole('USER')">—</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(alumnos)}">
                    <td colspan="5" class="text-center text-muted py-5">
                        <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                        No hay alumnos registrados todavía.
                        <a th:href="@{/alumnos/nuevo}" class="fw-semibold ms-1"
                           sec:authorize="hasRole('ADMIN')">Añade el primero</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
