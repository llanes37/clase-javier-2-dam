<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Editar alumno')}"></head>
<body class="bg-light">

<div th:replace="~{fragments/nav :: topnav}"></div>

<main class="container-lg py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h2 class="fw-bold mb-0"><i class="bi bi-pencil-square me-2 text-primary"></i>Editar alumno</h2>
                    <p class="text-muted small mb-0">
                        Modificando datos de <strong th:text="${form.nombre}">—</strong>
                    </p>
                </div>
                <a class="btn btn-outline-secondary btn-sm fw-semibold" th:href="@{/alumnos}">
                    <i class="bi bi-arrow-left me-1"></i>Volver
                </a>
            </div>

            <div class="alert alert-danger d-flex align-items-center gap-2 py-2" th:if="${error}" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i><span th:text="${error}"></span>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{|/alumnos/${alumnoId}/editar|}" th:object="${form}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre completo</label>
                            <input type="text" th:field="*{nombre}"
                                   th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                                   class="form-control" placeholder="Ej: Ana García López" autocomplete="off">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Correo electrónico</label>
                            <input type="email" th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   class="form-control" placeholder="alumno@correo.com" autocomplete="off">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Fecha de nacimiento <span class="text-muted fw-normal">(opcional)</span>
                            </label>
                            <input type="date" th:field="*{fechaNacimiento}" class="form-control">
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-primary fw-semibold px-4" type="submit">
                                <i class="bi bi-check-lg me-2"></i>Guardar cambios
                            </button>
                            <a class="btn btn-outline-secondary fw-semibold" th:href="@{/alumnos}">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
