<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Editar curso')}"></head>
<body class="bg-light">

<div th:replace="~{fragments/nav :: topnav}"></div>

<main class="container-lg py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h2 class="fw-bold mb-0"><i class="bi bi-pencil-square me-2 text-primary"></i>Editar curso</h2>
                    <p class="text-muted small mb-0">
                        Modificando <strong th:text="${form.nombre}">—</strong>
                    </p>
                </div>
                <a class="btn btn-outline-secondary btn-sm fw-semibold" th:href="@{/cursos}">
                    <i class="bi bi-arrow-left me-1"></i>Volver
                </a>
            </div>

            <div class="alert alert-danger d-flex align-items-center gap-2 py-2" th:if="${error}" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i><span th:text="${error}"></span>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{|/cursos/${cursoId}/editar|}" th:object="${form}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre</label>
                            <input type="text" th:field="*{nombre}"
                                   th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                                   class="form-control" placeholder="Nombre del curso">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tipo</label>
                            <select th:field="*{tipo}"
                                    th:classappend="${#fields.hasErrors('tipo')} ? 'is-invalid'"
                                    class="form-select">
                                <option th:each="tipo : ${tipos}" th:value="${tipo}" th:text="${tipo}"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}"></div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label fw-semibold">Fecha inicio</label>
                                <input type="date" th:field="*{fechaInicio}"
                                       th:classappend="${#fields.hasErrors('fechaInicio')} ? 'is-invalid'"
                                       class="form-control">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaInicio')}" th:errors="*{fechaInicio}"></div>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">Fecha fin</label>
                                <input type="date" th:field="*{fechaFin}"
                                       th:classappend="${#fields.hasErrors('fechaFin')} ? 'is-invalid'"
                                       class="form-control">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaFin')}" th:errors="*{fechaFin}"></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Precio (€)</label>
                            <input type="number" th:field="*{precio}"
                                   th:classappend="${#fields.hasErrors('precio')} ? 'is-invalid'"
                                   class="form-control" min="0" step="0.01" placeholder="0.00">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></div>
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-primary fw-semibold px-4" type="submit">
                                <i class="bi bi-check-lg me-2"></i>Guardar cambios
                            </button>
                            <a class="btn btn-outline-secondary fw-semibold" th:href="@{/cursos}">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
