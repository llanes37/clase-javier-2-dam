<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{fragments/head :: head('Cursos')}"></head>
<body class="bg-light">

<div th:replace="~{fragments/nav :: topnav}"></div>

<main class="container-lg py-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="fw-bold mb-0"><i class="bi bi-journal-bookmark-fill me-2 text-primary"></i>Cursos</h2>
            <p class="text-muted small mb-0">Listado de cursos disponibles</p>
        </div>
        <a class="btn btn-primary fw-semibold" th:href="@{/cursos/nuevo}" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-plus-circle me-2"></i>Nuevo curso
        </a>
    </div>

    <div class="alert alert-info d-flex align-items-center gap-2 py-2 mb-3" sec:authorize="hasRole('USER')">
        <i class="bi bi-eye-fill"></i>
        Estás en modo <strong class="ms-1">solo lectura</strong>. Contacta con un administrador para realizar cambios.
    </div>

    <div class="alert alert-success d-flex align-items-center gap-2 py-2" th:if="${ok}" role="alert">
        <i class="bi bi-check-circle-fill"></i><span th:text="${ok}"></span>
    </div>
    <div class="alert alert-danger d-flex align-items-center gap-2 py-2" th:if="${error}" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i><span th:text="${error}"></span>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="text-muted ps-4 fw-semibold" style="width:60px">ID</th>
                    <th class="fw-semibold">Nombre</th>
                    <th class="fw-semibold">Tipo</th>
                    <th class="fw-semibold">Inicio</th>
                    <th class="fw-semibold">Fin</th>
                    <th class="fw-semibold">Precio</th>
                    <th class="fw-semibold pe-4" style="width:220px">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="curso : ${cursos}">
                    <td class="text-muted ps-4 small" th:text="${curso.id}">1</td>
                    <td class="fw-semibold" th:text="${curso.nombre}">Curso</td>
                    <td>
                        <span class="badge bg-primary-subtle text-primary-emphasis" th:text="${curso.tipo}">ONLINE</span>
                    </td>
                    <td class="text-muted small" th:text="${curso.fechaInicio}">2026-03-01</td>
                    <td class="text-muted small" th:text="${curso.fechaFin}">2026-03-15</td>
                    <td class="fw-semibold"
                        th:text="${#numbers.formatDecimal(curso.precio, 1, 2)} + ' €'">199.00 €</td>
                    <td class="pe-4">
                        <div class="d-flex gap-2" sec:authorize="hasRole('ADMIN')">
                            <a class="btn btn-sm btn-outline-primary fw-semibold" th:href="@{|/cursos/${curso.id}/editar|}">
                                <i class="bi bi-pencil-square me-1"></i>Editar
                            </a>
                            <form th:action="@{|/cursos/${curso.id}/eliminar|}" method="post"
                                  onsubmit="return confirm('Se eliminará el curso. ¿Continuar?');">
                                <button class="btn btn-sm btn-outline-danger fw-semibold" type="submit">
                                    <i class="bi bi-trash me-1"></i>Eliminar
                                </button>
                            </form>
                        </div>
                        <span class="text-muted small" sec:authorize="hasRole('USER')">—</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(cursos)}">
                    <td colspan="7" class="text-center text-muted py-5">
                        <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                        No hay cursos registrados todavía.
                        <a th:href="@{/cursos/nuevo}" class="fw-semibold ms-1" sec:authorize="hasRole('ADMIN')">Añade el primero</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
