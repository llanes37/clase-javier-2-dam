<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: topnav}"></div>

<main class="shell page">
    <section class="page-header">
        <h1>Cursos</h1>
        <a class="btn" th:href="@{/cursos/nuevo}">Nuevo curso</a>
    </section>

    <!-- * Mensajes de resultado tras crear o eliminar -->
    <div class="alert ok" th:if="${ok}" th:text="${ok}"></div>
    <div class="alert error" th:if="${error}" th:text="${error}"></div>

    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Tipo</th>
            <th>Inicio</th>
            <th>Fin</th>
            <th>Precio</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="curso : ${cursos}">
            <td th:text="${curso.id}">1</td>
            <td th:text="${curso.nombre}">Curso</td>
            <td th:text="${curso.tipo}">ONLINE</td>
            <td th:text="${curso.fechaInicio}">2026-03-01</td>
            <td th:text="${curso.fechaFin}">2026-03-15</td>
            <td th:text="${#numbers.formatDecimal(curso.precio, 1, 2)} + ' EUR'">199.00 EUR</td>
            <td>
                <!-- ! Borrado protegido en service cuando existen matriculas ACTIVAS -->
                <form th:action="@{|/cursos/${curso.id}/eliminar|}" method="post"
                      onsubmit="return confirm('Se eliminara el curso. Continuar?');">
                    <button class="btn danger" type="submit">Eliminar</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
