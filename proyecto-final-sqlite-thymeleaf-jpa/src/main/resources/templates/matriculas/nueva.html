<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Nueva matrícula')}"></head>
<body class="bg-light">

<div th:replace="~{fragments/nav :: topnav}"></div>

<main class="container-lg py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h2 class="fw-bold mb-0"><i class="bi bi-plus-circle me-2 text-primary"></i>Nueva matrícula</h2>
                    <p class="text-muted small mb-0">Asocia un alumno a un curso</p>
                </div>
                <a class="btn btn-outline-secondary btn-sm fw-semibold" th:href="@{/matriculas}">
                    <i class="bi bi-arrow-left me-1"></i>Volver
                </a>
            </div>

            <div class="alert alert-danger d-flex align-items-center gap-2 py-2" th:if="${error}" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i><span th:text="${error}"></span>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/matriculas}" th:object="${form}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Alumno</label>
                            <select th:field="*{alumnoId}"
                                    th:classappend="${#fields.hasErrors('alumnoId')} ? 'is-invalid'"
                                    class="form-select">
                                <option value="">Selecciona un alumno</option>
                                <option th:each="alumno : ${alumnos}" th:value="${alumno.id}"
                                        th:text="${alumno.nombre + ' (' + alumno.email + ')'}">
                                </option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('alumnoId')}" th:errors="*{alumnoId}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Curso</label>
                            <select th:field="*{cursoId}"
                                    th:classappend="${#fields.hasErrors('cursoId')} ? 'is-invalid'"
                                    class="form-select">
                                <option value="">Selecciona un curso</option>
                                <option th:each="curso : ${cursos}" th:value="${curso.id}"
                                        th:text="${curso.nombre + ' [' + curso.tipo + ']'}">
                                </option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('cursoId')}" th:errors="*{cursoId}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Fecha matrícula <span class="text-muted fw-normal">(opcional)</span>
                            </label>
                            <input type="date" th:field="*{fechaMatricula}" class="form-control">
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-primary fw-semibold px-4" type="submit">
                                <i class="bi bi-check-lg me-2"></i>Guardar matrícula
                            </button>
                            <a class="btn btn-outline-secondary fw-semibold" th:href="@{/matriculas}">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
