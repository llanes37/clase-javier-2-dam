<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{fragments/head :: head('Matrículas')}"></head>
<body class="bg-light">

<div th:replace="~{fragments/nav :: topnav}"></div>

<main class="container-lg py-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="fw-bold mb-0"><i class="bi bi-card-list me-2 text-primary"></i>Matrículas</h2>
            <p class="text-muted small mb-0">Registro de matrículas activas e históricas</p>
        </div>
        <a class="btn btn-primary fw-semibold" th:href="@{/matriculas/nueva}" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-plus-circle me-2"></i>Nueva matrícula
        </a>
    </div>

    <div class="alert alert-info d-flex align-items-center gap-2 py-2 mb-3" sec:authorize="hasRole('USER')">
        <i class="bi bi-eye-fill"></i>
        Estás en modo <strong class="ms-1">solo lectura</strong>. Contacta con un administrador para realizar cambios.
    </div>

    <div class="alert alert-success d-flex align-items-center gap-2 py-2" th:if="${ok}" role="alert">
        <i class="bi bi-check-circle-fill"></i><span th:text="${ok}"></span>
    </div>
    <div class="alert alert-danger d-flex align-items-center gap-2 py-2" th:if="${error}" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i><span th:text="${error}"></span>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="text-muted ps-4 fw-semibold" style="width:60px">ID</th>
                    <th class="fw-semibold">Alumno</th>
                    <th class="fw-semibold">Curso</th>
                    <th class="fw-semibold">Fecha</th>
                    <th class="fw-semibold">Estado</th>
                    <th class="fw-semibold pe-4" style="width:280px">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="matricula : ${matriculas}">
                    <td class="text-muted ps-4 small" th:text="${matricula.id}">1</td>
                    <td class="fw-semibold" th:text="${matricula.alumno.nombre}">Alumno</td>
                    <td th:text="${matricula.curso.nombre}">Curso</td>
                    <td class="text-muted small" th:text="${matricula.fechaMatricula}">2026-03-03</td>
                    <td>
                        <span class="badge bg-success" th:if="${matricula.estado.name() == 'ACTIVA'}">ACTIVA</span>
                        <span class="badge bg-secondary" th:unless="${matricula.estado.name() == 'ACTIVA'}"
                              th:text="${matricula.estado}">ANULADA</span>
                    </td>
                    <td class="pe-4">
                        <div class="d-flex flex-wrap gap-2" sec:authorize="hasRole('ADMIN')">
                            <a class="btn btn-sm btn-outline-primary fw-semibold" th:href="@{|/matriculas/${matricula.id}/editar|}">
                                <i class="bi bi-pencil-square me-1"></i>Editar
                            </a>
                            <form th:if="${matricula.estado.name() == 'ACTIVA'}"
                                  th:action="@{|/matriculas/${matricula.id}/anular|}" method="post">
                                <button class="btn btn-sm btn-outline-warning fw-semibold" type="submit">
                                    <i class="bi bi-x-circle me-1"></i>Anular
                                </button>
                            </form>
                            <form th:action="@{|/matriculas/${matricula.id}/eliminar|}" method="post"
                                  onsubmit="return confirm('Se eliminará la matrícula. ¿Continuar?');">
                                <button class="btn btn-sm btn-outline-danger fw-semibold" type="submit">
                                    <i class="bi bi-trash me-1"></i>Eliminar
                                </button>
                            </form>
                        </div>
                        <span class="text-muted small" sec:authorize="hasRole('USER')">—</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(matriculas)}">
                    <td colspan="6" class="text-center text-muted py-5">
                        <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                        No hay matrículas registradas todavía.
                        <a th:href="@{/matriculas/nueva}" class="fw-semibold ms-1" sec:authorize="hasRole('ADMIN')">Añade la primera</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
