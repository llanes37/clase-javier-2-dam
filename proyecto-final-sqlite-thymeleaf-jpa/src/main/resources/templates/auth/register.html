<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-body">

<div class="auth-card">
    <div class="auth-logo">
        <span class="auth-logo-icon">🎓</span>
        <h1 class="auth-title">Crear cuenta</h1>
        <p class="auth-subtitle">Proyecto Final JPA</p>
    </div>

    <!--
        * 🧠 TEORÍA: th:object vincula el formulario con el RegisterForm (DTO).
        ? th:field genera automáticamente id, name y value del campo.
        ? th:errors muestra el mensaje de error de Bean Validation para ese campo.
    -->
    <form th:action="@{/register}" th:object="${form}" method="post" class="form">

        <div>
            <label for="username">Nombre de usuario</label>
            <input type="text" id="username" th:field="*{username}"
                   placeholder="min. 3 caracteres, solo letras y números"
                   autocomplete="username" autofocus>
            <p class="field-error" th:if="${#fields.hasErrors('username')}"
               th:errors="*{username}">Error</p>
        </div>

        <div>
            <label for="password">Contraseña</label>
            <input type="password" id="password" th:field="*{password}"
                   placeholder="mínimo 6 caracteres"
                   autocomplete="new-password">
            <p class="field-error" th:if="${#fields.hasErrors('password')}"
               th:errors="*{password}">Error</p>
        </div>

        <div>
            <label for="rol">Rol</label>
            <!-- ? El valor que se envía es "ROLE_USER" o "ROLE_ADMIN" -->
            <select id="rol" th:field="*{rol}">
                <option value="">-- Selecciona un rol --</option>
                <option value="ROLE_USER">Usuario (solo lectura)</option>
                <option value="ROLE_ADMIN">Administrador (lectura y escritura)</option>
            </select>
            <p class="field-error" th:if="${#fields.hasErrors('rol')}"
               th:errors="*{rol}">Error</p>
        </div>

        <button class="btn" type="submit" style="margin-top:6px">Crear cuenta</button>
    </form>

    <p class="auth-footer">
        ¿Ya tienes cuenta?
        <a th:href="@{/login}">Iniciar sesión</a>
    </p>
</div>

</body>
</html>
