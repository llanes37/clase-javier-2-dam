<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    * Fragmento de <head> reutilizable para todas las vistas.
    ? Centralizar aquí las dependencias (Bootstrap, Bootstrap Icons, CSS propio)
    ? garantiza que actualizar una versión afecte a toda la app de una sola vez.
-->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' — Proyecto Final JPA'">Proyecto Final JPA</title>
    <!-- * Bootstrap 5.3 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- * Bootstrap Icons 1.11 (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- * Estilos propios del proyecto (complementan Bootstrap) -->
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
</html>
