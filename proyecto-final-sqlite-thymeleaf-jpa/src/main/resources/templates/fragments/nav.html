<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<body>

<!--
    * Fragmento de navegación Bootstrap — reutilizado en todas las vistas autenticadas.
    ? sec:authorize usa el contexto de Spring Security para mostrar/ocultar elementos.
    ? #authentication.name devuelve el username del usuario autenticado.
    ! El logout requiere POST para proteger contra CSRF (ataques por enlace).
-->
<nav class="navbar navbar-expand-lg pf-navbar shadow-sm" style="background:linear-gradient(90deg,#0d3c47 0%,#145b67 100%)!important;" th:fragment="topnav">
    <div class="container-lg">

        <!-- Marca / logo -->
        <a class="navbar-brand text-white fw-bold d-flex align-items-center gap-2" th:href="@{/}">
            <span style="font-size:1.3rem;">🎓</span>
            <span>Proyecto Final JPA</span>
        </a>

        <!-- Botón hamburguesa (móvil) -->
        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#navMenu"
                aria-controls="navMenu" aria-expanded="false" aria-label="Menú">
            <i class="bi bi-list text-white fs-4"></i>
        </button>

        <!-- Links + zona de usuario -->
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link text-white fw-semibold" th:href="@{/alumnos}">
                        <i class="bi bi-people me-1"></i>Alumnos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white fw-semibold" th:href="@{/cursos}">
                        <i class="bi bi-journal-bookmark me-1"></i>Cursos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white fw-semibold" th:href="@{/matriculas}">
                        <i class="bi bi-card-list me-1"></i>Matrículas
                    </a>
                </li>
            </ul>

            <!-- Dropdown del usuario -->
            <div class="dropdown">
                <button class="btn pf-user-btn dropdown-toggle d-flex align-items-center gap-2"
                        type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <!-- Avatar con inicial del usuario -->
                    <span class="pf-user-avatar"
                          th:text="${#authentication.name.substring(0,1).toUpperCase()}">U</span>
                    <span class="fw-semibold small" th:text="${#authentication.name}">usuario</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" style="min-width:220px;border-radius:14px!important;">
                    <!-- Cabecera del dropdown -->
                    <li>
                        <div class="d-flex align-items-center gap-3 px-3 py-3">
                            <span class="pf-user-avatar-lg"
                                  th:text="${#authentication.name.substring(0,1).toUpperCase()}">U</span>
                            <div>
                                <div class="fw-bold lh-1 mb-1" th:text="${#authentication.name}">usuario</div>
                                <!-- Badge del rol -->
                                <span class="badge bg-warning text-dark small" sec:authorize="hasRole('ADMIN')">
                                    <i class="bi bi-shield-fill me-1"></i>Administrador
                                </span>
                                <span class="badge bg-info text-dark small" sec:authorize="hasRole('USER')">
                                    <i class="bi bi-eye me-1"></i>Solo lectura
                                </span>
                            </div>
                        </div>
                    </li>
                    <li><hr class="dropdown-divider my-1"></li>
                    <!-- Logout -->
                    <li>
                        <form th:action="@{/logout}" method="post" class="px-2 pb-2 pt-1">
                            <button type="submit" class="btn btn-danger w-100 fw-semibold">
                                <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
                            </button>
                        </form>
                    </li>
                </ul>
            </div>

        </div>
    </div>
</nav>

</body>
</html>
