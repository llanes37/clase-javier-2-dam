<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
    * Fragmento de scripts globales para el final del <body>.
    ? Bootstrap JS (bundle incluye Popper) debe cargarse al final del body
    ? para no bloquear el renderizado del HTML.
-->
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</th:block>
</body>
</html>
